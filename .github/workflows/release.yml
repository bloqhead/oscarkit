name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.bump.outputs.version }}
      tag: ${{ steps.bump.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Auto patch-bump: v0.1.0 -> v0.1.1 -> v0.1.2 on every push to main, no
      # commit-message conventions required. Bootstraps from whatever version
      # is already in tauri.conf.json if no release tag exists yet.
      - name: Compute and commit next version
        id: bump
        run: |
          set -euo pipefail

          CURRENT=$(jq -r '.version' src-tauri/tauri.conf.json)
          LAST_TAG=$(git tag --list 'v*' --sort=-v:refname | head -n1)

          # Always bump one patch above whichever baseline applies (the last
          # release tag, or the version already on disk if none exists yet)
          # so this always produces a real file diff to commit — reusing an
          # unchanged version here means "nothing to commit", which aborts
          # the job under `set -e`.
          BASE_VERSION=${LAST_TAG#v}
          BASE_VERSION=${BASE_VERSION:-$CURRENT}
          IFS='.' read -r MAJOR MINOR PATCH <<< "$BASE_VERSION"
          NEW_VERSION="$MAJOR.$MINOR.$((PATCH + 1))"

          jq --arg v "$NEW_VERSION" '.version = $v' src-tauri/tauri.conf.json > /tmp/tauri.conf.json
          mv /tmp/tauri.conf.json src-tauri/tauri.conf.json

          jq --arg v "$NEW_VERSION" '.version = $v' package.json > /tmp/package.json
          mv /tmp/package.json package.json

          sed -i "s/^version = \".*\"/version = \"$NEW_VERSION\"/" src-tauri/Cargo.toml

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src-tauri/tauri.conf.json package.json src-tauri/Cargo.toml
          git commit -m "chore: release v${NEW_VERSION} [skip ci]"
          git tag "v${NEW_VERSION}"
          git push origin HEAD:main
          git push origin "v${NEW_VERSION}"

          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$NEW_VERSION" >> "$GITHUB_OUTPUT"

  build:
    needs: version
    strategy:
      fail-fast: false
      matrix:
        platform: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.version.outputs.tag }}

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            build-essential \
            curl \
            wget \
            file \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            libjavascriptcoregtk-4.1-dev \
            libsoup-3.0-dev

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: '. -> target'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Build and publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ needs.version.outputs.tag }}
          releaseName: 'OSCARKit ${{ needs.version.outputs.tag }}'
          releaseBody: 'Automated build from the latest push to main.'
          releaseDraft: false
          prerelease: false
